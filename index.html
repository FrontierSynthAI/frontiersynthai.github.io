<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrontierSynth AI</title>
    <style>
        body { 
            background-color: #030712; 
            color: #f9fafb; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .container { max-width: 650px; padding: 40px 20px; }
        
        /* Premium Gradient Header */
        h1 { 
            font-size: 3.8rem; 
            letter-spacing: -0.06em; 
            margin-bottom: 0.5rem; 
             background: linear-gradient(135deg, #60a5fa 0%, #c2a5f8 50%, #81ecd3 100%); 
            /* background: linear-gradient(135deg, #7c9afd 0%, #9ca5ff 50%, #b492eb 100%); */

			-webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.2));
        }

        .main-desc { 
            color: #9ca3af; 
            font-size: 1.25rem; 
            line-height: 1.6; 
            margin-bottom: 1.5rem; 
        }

        /* Subtle Patent Row */
        .patent-brief {
            display: inline-flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            padding: 12px 24px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: #d1d5db;
        }

        .amber-text { color: #f59e0b; font-weight: 700; }

        .tag { 
            display: inline-block; 
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8; 
            padding: 4px 16px; 
            border-radius: 9999px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem; 
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .footer {
            font-size: 0.9rem; 
            margin-top: 4rem; 
            color: #4b5563; 
        }

        a { color: #60a5fa; text-decoration: none; transition: opacity 0.2s; }
        a:hover { opacity: 0.8; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tag">Coming Soon</div>
        
        <h1>FrontierSynth AI</h1>
        
        <p class="main-desc">Advancing generative synthesis and multi-modal AI systems for robotics and assistive technology</p>
        
        <div class="patent-brief">
            <span><span class="amber-text">1</span> NPA PENDING</span>
            <span style="color: #374151;">|</span>
            <span><span class="amber-text">2</span> PPA PENDING</span>
        </div>

        <div class="footer">
            Inquiries: <a href="mailto:info@frontiersynth.ai">info@frontiersynth.ai</a>
        </div>
    </div>
</body>
</html>
